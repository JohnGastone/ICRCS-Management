# Serves the compiled CRA static bundle and reverse-proxies the management API.
# This file overrides nginx's default server (copied to conf.d/default.conf).
server {
    listen       6060;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # ── Management backend (auth + case management) ──────────────────────────
    # Same-origin proxy so the browser never talks to 10.232.x directly.
    #   /api/v1/auth/login  ->  http://10.232.0.12:3231/api/v1/auth/login
    location /api/ {
        proxy_pass         http://10.232.0.12:3231/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout    60s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # react-router owns client-side routing; every non-file path serves the app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted CRA build assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
